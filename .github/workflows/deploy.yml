name: Deploy via SFTP

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deployment tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes git-ftp curl

      - name: Configure SFTP host key
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          cat <<'EOF' > "${HOME}/.ssh/known_hosts"
          sftp.wp.com ssh-rsa 
          EOF
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Deploy changed wp-content files with git-ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          remote_dir="${FTP_SERVER_DIR%/}"

          case "${remote_dir}" in
            ""|"."|"./"|"~"|"/~"|"htdocs"|"/htdocs"|"/srv/htdocs")
              remote_url="sftp://${FTP_SERVER}:${FTP_PORT}/~/wp-content/"
              ;;
            *)
              remote_url="sftp://${FTP_SERVER}:${FTP_PORT}/${remote_dir#/}/wp-content/"
              ;;
          esac

          echo "Deploying to ${remote_url}"

          git config git-ftp.url "${remote_url}"
          git config git-ftp.user "${FTP_USERNAME}"
          git config git-ftp.password "${FTP_PASSWORD}"
          git config git-ftp.syncroot "wp-content/"

          seeded_baseline=""

          if git ftp show >/dev/null 2>&1; then
            echo "Remote deploy state already exists."
          else
            if [[ -n "${GITHUB_BEFORE_SHA}" && ! "${GITHUB_BEFORE_SHA}" =~ ^0+$ ]] && git cat-file -e "${GITHUB_BEFORE_SHA}^{commit}" 2>/dev/null; then
              echo "No remote deploy state found; seeding baseline to ${GITHUB_BEFORE_SHA}."
              git ftp catchup --force --commit "${GITHUB_BEFORE_SHA}"
              seeded_baseline="${GITHUB_BEFORE_SHA}"
            else
              echo "No remote deploy state found, and no safe baseline commit is available."
              exit 1
            fi
          fi

          if [[ -n "${seeded_baseline}" ]] && git diff --quiet "${seeded_baseline}" "${GITHUB_AFTER_SHA}" -- wp-content; then
            echo "No wp-content changes in this push; advancing deploy state only."
            git ftp catchup --force --commit "${GITHUB_AFTER_SHA}"
          else
            git ftp push --force --lock --verbose
          fi

      - name: Confirm deployment completed
        run: echo "SFTP deployment completed for commit ${GITHUB_SHA}"

      - name: Verify site is responding
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          set -euo pipefail

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-delay 5 \
              --max-time 30 \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${DEPLOY_HEALTHCHECK_URL}"
          )"

          if [[ "${http_code}" =~ ^(2|3) ]]; then
            echo "Health check passed with HTTP ${http_code}"
          else
            echo "Health check failed with HTTP ${http_code}"
            exit 1
          fi

      - name: Skip HTTP verification when no health-check URL is configured
        if: ${{ env.DEPLOY_HEALTHCHECK_URL == '' }}
        run: echo "DEPLOY_HEALTHCHECK_URL is not set, so the post-deploy HTTP check was skipped."
