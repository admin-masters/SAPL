name: Deploy via SFTP

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy wp-content over SFTP
        uses: Automattic/FTP-Deploy-Action@3.1.2
        with:
          ftp-server: sftp://${{ secrets.FTP_SERVER }}/${{ secrets.FTP_SERVER_DIR }}/wp-content/
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
          known-hosts: "\
            sftp.wp.com ssh-rsa AAAAB3NzaC1yc2EAAAADAQAB\
            AAABAQDwfT/YEhOKO2Z0+XrjRqUS5Q2Ali6AlhOhZtzlIfMOvm03Sype\
            DJH70tlUHasS+nm0SnZ01fOiEeAXa91ZhMihIYUT3nTGuiA2J3uVYsyS\
            CJefvhWc0kg1FbEus3V3cVmx4e3XctdkzLbOgPNngypZocbP+8yCpbx6\
            Kb9lihmgTjgGn2QzbK1enRSzsN/CbjVhej9jwukbrWqdCrQsKAsoZ2p6\
            YCtcKbHS+Yy4RwcO9PxZUBkeMXUrejms027bRcdVfwf55hWSD9xYEHpE\
            HupkSL4ofWs3UKeRGz+jCCzl7Nu0S6VSwK4Zzll0auHI0Hwh8WKTJbSn\
            1gxCdF93/rmP\
          "
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            **/.envrc
            **/.vscode/**
            **/.idea/**
            **/.ddev/**
            **/.wp-env.json
            **/docker-compose*.yml
            **/compose*.yml
            **/*.local.php
            **/local-config*.php
            **/wp-cli*.yml
            **/wp-cli*.yaml

      - name: Confirm deployment completed
        run: echo "SFTP deployment completed for commit ${GITHUB_SHA}"

      - name: Verify site is responding
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          set -euo pipefail

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-delay 5 \
              --max-time 30 \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${DEPLOY_HEALTHCHECK_URL}"
          )"

          if [[ "${http_code}" =~ ^(2|3) ]]; then
            echo "Health check passed with HTTP ${http_code}"
          else
            echo "Health check failed with HTTP ${http_code}"
            exit 1
          fi

      - name: Skip HTTP verification when no health-check URL is configured
        if: ${{ env.DEPLOY_HEALTHCHECK_URL == '' }}
        run: echo "DEPLOY_HEALTHCHECK_URL is not set, so the post-deploy HTTP check was skipped."
