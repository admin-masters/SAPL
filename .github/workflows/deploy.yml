name: Deploy via SFTP

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rsync Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deployment tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes sshpass rsync curl

      - name: Configure SFTP host key
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          ssh-keyscan -p "${FTP_PORT}" "${FTP_SERVER}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Deploy wp-content code folders with rsync
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail

          remote_dir="${FTP_SERVER_DIR%/}"

          case "${remote_dir}" in
            ""|"."|"./"|"~"|"/~"|"htdocs"|"/htdocs"|"/srv/htdocs")
              remote_root="~/wp-content"
              ;;
            *)
              remote_root="${remote_dir#/}/wp-content"
              ;;
          esac

          export SSHPASS="${FTP_PASSWORD}"
          rsync_ssh="ssh -p ${FTP_PORT} -o PreferredAuthentications=password -o PubkeyAuthentication=no -o KbdInteractiveAuthentication=no -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts"

          sync_dir() {
            local source_dir="$1"
            local target_dir="$2"

            if [[ ! -d "${source_dir}" ]]; then
              echo "Skipping missing directory ${source_dir}"
              return 0
            fi

            echo "Syncing ${source_dir} -> ${target_dir}"

            sshpass -e rsync \
              --archive \
              --compress \
              --delete \
              --delete-delay \
              --human-readable \
              --itemize-changes \
              --omit-dir-times \
              --exclude-from=".rsync-exclude" \
              -e "${rsync_ssh}" \
              "${source_dir}/" \
              "${FTP_USERNAME}@${FTP_SERVER}:${target_dir}/"
          }

          sync_dir "wp-content/mu-plugins" "${remote_root}/mu-plugins"
          sync_dir "wp-content/plugins" "${remote_root}/plugins"
          sync_dir "wp-content/themes" "${remote_root}/themes"

      - name: Confirm deployment completed
        run: echo "Rsync deployment completed for commit ${GITHUB_SHA}"

      - name: Verify site is responding
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          set -euo pipefail

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-delay 5 \
              --max-time 30 \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${DEPLOY_HEALTHCHECK_URL}"
          )"

          if [[ "${http_code}" =~ ^(2|3) ]]; then
            echo "Health check passed with HTTP ${http_code}"
          else
            echo "Health check failed with HTTP ${http_code}"
            exit 1
          fi

      - name: Skip HTTP verification when no health-check URL is configured
        if: ${{ env.DEPLOY_HEALTHCHECK_URL == '' }}
        run: echo "DEPLOY_HEALTHCHECK_URL is not set, so the post-deploy HTTP check was skipped."
