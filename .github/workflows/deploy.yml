name: Deploy via SFTP

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Delta Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deployment tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes sshpass curl

      - name: Configure SFTP host key
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          ssh-keyscan -p "${FTP_PORT}" "${FTP_SERVER}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Deploy changed wp-content code files over SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          export SSHPASS="${FTP_PASSWORD}"

          if [[ -z "${GITHUB_BEFORE_SHA}" || "${GITHUB_BEFORE_SHA}" =~ ^0+$ ]] || ! git cat-file -e "${GITHUB_BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "No safe baseline commit is available for changed-file deployment."
            exit 1
          fi

          remote_dir="${FTP_SERVER_DIR%/}"

          case "${remote_dir}" in
            ""|"."|"./"|"~"|"/~"|"htdocs"|"/htdocs"|"/srv/htdocs")
              remote_prefix=""
              ;;
            *)
              remote_prefix="${remote_dir#/}"
              ;;
          esac

          should_skip() {
            local path="$1"

            case "$path" in
              *.DS_Store|*/.DS_Store|Thumbs.db|*/Thumbs.db|*.local.php|*/local-config*.php|local-config*.php|*.env|*.env.*|.env|.env.*|.envrc|*.wp-env.json|.wp-env.json|wp-cli*.yml|wp-cli*.yaml|*/wp-cli*.yml|*/wp-cli*.yaml)
                return 0
                ;;
            esac

            return 1
          }

          changed_count=0
          deleted_count=0
          batch_file="$(mktemp)"
          upload_list="$(mktemp)"
          deleted_list="$(mktemp)"
          dir_list="$(mktemp)"
          trap 'rm -f "${batch_file}" "${upload_list}" "${deleted_list}" "${dir_list}"' EXIT

          sftp_cmd=(
            sshpass -e sftp
            -P "${FTP_PORT}"
            -o PreferredAuthentications=password
            -o PubkeyAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -b "${batch_file}"
            "${FTP_USERNAME}@${FTP_SERVER}"
          )

          remote_path() {
            local path="$1"

            if [[ -z "${remote_prefix}" ]]; then
              printf '%s' "${path}"
            else
              printf '%s/%s' "${remote_prefix}" "${path}"
            fi
          }

          queue_remote_dir() {
            local dir="$1"

            while [[ -n "${dir}" && "${dir}" != "." && "${dir}" != "/" ]]; do
              printf '%s\n' "${dir}" >> "${dir_list}"
              dir="$(dirname "${dir}")"
            done
          }

          while IFS= read -r -d '' status; do
            case "$status" in
              R*)
                IFS= read -r -d '' old_path
                IFS= read -r -d '' new_path
                if ! should_skip "$old_path"; then
                  printf '%s\n' "$(remote_path "$old_path")" >> "${deleted_list}"
                  deleted_count=$((deleted_count + 1))
                fi
                if [[ -f "$new_path" ]] && ! should_skip "$new_path"; then
                  remote_target="$(remote_path "$new_path")"
                  printf '%s\t%s\n' "$new_path" "$remote_target" >> "${upload_list}"
                  queue_remote_dir "$(dirname "$remote_target")"
                  changed_count=$((changed_count + 1))
                fi
                ;;
              C*)
                IFS= read -r -d '' _old_path
                IFS= read -r -d '' new_path
                if [[ -f "$new_path" ]] && ! should_skip "$new_path"; then
                  remote_target="$(remote_path "$new_path")"
                  printf '%s\t%s\n' "$new_path" "$remote_target" >> "${upload_list}"
                  queue_remote_dir "$(dirname "$remote_target")"
                  changed_count=$((changed_count + 1))
                fi
                ;;
              D)
                IFS= read -r -d '' path
                if ! should_skip "$path"; then
                  printf '%s\n' "$(remote_path "$path")" >> "${deleted_list}"
                  deleted_count=$((deleted_count + 1))
                fi
                ;;
              *)
                IFS= read -r -d '' path
                if [[ -f "$path" ]] && ! should_skip "$path"; then
                  remote_target="$(remote_path "$path")"
                  printf '%s\t%s\n' "$path" "$remote_target" >> "${upload_list}"
                  queue_remote_dir "$(dirname "$remote_target")"
                  changed_count=$((changed_count + 1))
                fi
                ;;
            esac
          done < <(
            git diff --name-status -z --find-renames "${GITHUB_BEFORE_SHA}" "${GITHUB_AFTER_SHA}" -- \
              wp-content/mu-plugins \
              wp-content/plugins \
              wp-content/themes
          )

          if [[ "${changed_count}" -eq 0 && "${deleted_count}" -eq 0 ]]; then
            echo "No deployable wp-content code changes detected."
            exit 0
          fi

          echo "Preparing ${changed_count} uploads and ${deleted_count} deletions."

          if [[ -s "${dir_list}" ]]; then
            awk '!seen[$0]++ { print length($0) "\t" $0 }' "${dir_list}" \
              | sort -n \
              | cut -f2- \
              | while IFS= read -r remote_dir_path; do
                  printf -- '-mkdir %s\n' "${remote_dir_path}" >> "${batch_file}"
                done
          fi

          if [[ "${changed_count}" -gt 0 ]]; then
            while IFS=$'\t' read -r local_path remote_target; do
              printf 'put %s %s\n' "${local_path}" "${remote_target}" >> "${batch_file}"
            done < "${upload_list}"
          fi

          if [[ "${deleted_count}" -gt 0 ]]; then
            while IFS= read -r remote_target; do
              [[ -n "${remote_target}" ]] || continue
              printf -- '-rm %s\n' "${remote_target}" >> "${batch_file}"
            done < "${deleted_list}"
          fi

          "${sftp_cmd[@]}"

      - name: Confirm deployment completed
        run: echo "SFTP delta deployment completed for commit ${GITHUB_SHA}"

      - name: Verify site is responding
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          set -euo pipefail

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-delay 5 \
              --max-time 30 \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${DEPLOY_HEALTHCHECK_URL}"
          )"

          if [[ "${http_code}" =~ ^(2|3) ]]; then
            echo "Health check passed with HTTP ${http_code}"
          else
            echo "Health check failed with HTTP ${http_code}"
            exit 1
          fi

      - name: Skip HTTP verification when no health-check URL is configured
        if: ${{ env.DEPLOY_HEALTHCHECK_URL == '' }}
        run: echo "DEPLOY_HEALTHCHECK_URL is not set, so the post-deploy HTTP check was skipped."
